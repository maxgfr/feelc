name: release

on:
  push:
    branches: [main]

permissions:
  contents: write # create tags + release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # semantic-release needs the full history
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          install-only: true
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # semantic-release computes the version, creates the tag, then (via exec) goreleaser
      # publishes the multi-OS/arch binaries to the GitHub release.
      - run: npx --yes -p semantic-release -p @semantic-release/exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
