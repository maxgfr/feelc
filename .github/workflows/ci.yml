name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Matrice multi-arch : ubuntu = amd64, macos-14+ = arm64.
    # C'est ce qui prouve le déterminisme bit-à-bit inter-plateforme (thèse centrale du projet).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true
      - run: go version && go env GOARCH
      - run: go vet ./...
      - run: go test -race ./...
