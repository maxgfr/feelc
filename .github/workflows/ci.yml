name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Multi-arch matrix: ubuntu = amd64, macos-14+ = arm64.
    # This proves the bit-for-bit cross-platform determinism (the project's core thesis).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - run: go version && go env GOARCH
      - run: go vet ./...
      - run: go test ./internal/i18nguard/ # the repo must stay English-only
      - run: go test -race ./...           # runs the fuzz SEED corpora too (FuzzCompile / FuzzDecodeIR)

  # Active fuzzing of the highest-risk surfaces: the full front-end and untrusted .ir.bin decoding.
  fuzz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - run: go test -run='^$' -fuzz='^FuzzCompile$' -fuzztime=60s ./internal/loader/
      - run: go test -run='^$' -fuzz='^FuzzDecodeIR$' -fuzztime=60s ./internal/loader/
      - run: go test -run='^$' -fuzz='^FuzzExprLower$' -fuzztime=60s ./internal/loader/
      - run: go test -run='^$' -fuzz='^FuzzEval$' -fuzztime=60s ./internal/engine/
      - run: go test -run='^$' -fuzz='^FuzzImportDMN$' -fuzztime=60s ./internal/dmnxml/

  # The optional SMT (Z3) verification backend (ADR 0007) is build-tagged; build and test it with z3 present.
  smt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - run: sudo apt-get update && sudo apt-get install -y z3
      - run: go build -tags smt ./...
      - run: go test -tags smt ./internal/verify/ ./internal/smt/
