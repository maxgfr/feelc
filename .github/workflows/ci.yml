name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    # Multi-arch matrix: ubuntu = amd64, macos-14+ = arm64.
    # This proves the bit-for-bit cross-platform determinism (the project's core thesis).
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          check-latest: true
      - run: go version && go env GOARCH
      - run: go vet ./...
      - run: go test ./internal/i18nguard/ # the repo must stay English-only
      - run: go test -race ./...
