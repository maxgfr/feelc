name: npm

# Builds, tests and (on a v* tag) publishes the @feelc/engine package — the Go engine compiled to
# WebAssembly, wrapped as a portable TypeScript package.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Native CLI — the parity test compares @feelc/engine (WASM) against it.
      - name: Build the native feelc CLI
        run: make build

      - run: npm ci

      - name: Build @feelc/engine (compiles the engine to WASM + bundles TS)
        run: npm run build -w @feelc/engine

      - name: Unit tests (WASM behaviour)
        run: npm run test -w @feelc/engine

      - name: Parity + cross-tool tests (WASM vs CLI)
        run: npm run test -w @feelc-examples/node-smoke

      - name: Bundler smoke (Vite resolves the WASM asset)
        run: npm run build -w @feelc-examples/browser-vite

  publish:
    # OIDC "trusted publishing" — NO NPM_TOKEN secret. This job stays inert until the trusted
    # publisher for @feelc/engine is configured on npmjs.com (done once, after the first manual
    # `npm publish`). Until then it will fail auth on a tag, which is expected.
    needs: build-test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for OIDC + npm provenance
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          check-latest: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing requires a recent npm.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Build @feelc/engine
        run: npm run build -w @feelc/engine

      - name: Publish to npm (OIDC, with provenance)
        run: npm publish -w @feelc/engine --access public
