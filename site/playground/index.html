<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>feelc — playground</title>
  <script>(function(){var t;try{var q=new URLSearchParams(location.search).get('theme');t=(q==='light'||q==='dark')?q:localStorage.getItem('feelc.theme');}catch(e){}if(t!=='light'&&t!=='dark')t=matchMedia('(prefers-color-scheme: light)').matches?'light':'dark';document.documentElement.dataset.theme=t;})();</script>
  <link rel="stylesheet" href="../theme.css" />
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <a class="skip-link" href="#source">Skip to the editor</a>
  <h1 class="visually-hidden">feelc playground</h1>
  <nav class="nav">
    <a class="brand" href="../"><svg class="wordmark" viewBox="0 0 24 24" width="20" height="20" role="img" aria-label="feelc logo"><rect class="mk-bg" x="2" y="2" width="20" height="20" rx="5"/><path class="mk-ck" d="M7 12.4l3.2 3.2L17 8.8" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg> feelc<span> · playground</span></a>
    <div class="links">
      <span class="wasm-status" id="wasm-status" role="status" aria-live="polite">loading engine…</span>
      <a href="../docs/">Docs</a>
      <a href="https://github.com/maxgfr/feelc" target="_blank" rel="noopener">GitHub</a>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-label="Toggle light or dark theme" title="Toggle theme"><span class="icon-moon" aria-hidden="true">☾</span><span class="icon-sun" aria-hidden="true">☀</span></button>
    </div>
  </nav>

  <main class="pg">
    <!-- Left: editor + examples + simulator -->
    <section class="col left">
      <div class="bar">
        <h2>.rules</h2>
        <select id="example" title="Load an example" aria-label="Load an example"><option value="">— examples —</option></select>
      </div>
      <textarea id="source" spellcheck="false" aria-label="Rules source" placeholder="Write or paste a .rules model — it is verified and run live, in your browser."></textarea>

      <div class="run">
        <div class="run-head">
          <h3>Inputs &amp; simulation</h3>
          <label class="goal-label" for="goal">decision <select id="goal" title="Which decision to evaluate"><option value="">…</option></select></label>
          <span class="recompute idle" id="recompute">live</span>
        </div>
        <div id="sim-form" class="sim-form"></div>
        <details class="json-adv">
          <summary>edit inputs as JSON</summary>
          <textarea id="input" rows="3" spellcheck="false" aria-label="Inputs as JSON" placeholder='{"cart_total": 120, "is_member": true}'></textarea>
          <div class="json-err" id="json-err"></div>
        </details>
        <div class="result" id="result"></div>
      </div>
    </section>

    <!-- Right: verification, graph, traceability -->
    <section class="col right scroll">
      <div class="bar">
        <h2>analysis</h2>
        <div class="actions">
          <button id="verify-btn">Verify</button>
          <button id="graph-btn">Graph</button>
          <button id="trace-btn" title="Which @source citation each decision carries">Traceability</button>
        </div>
      </div>
      <div class="report" id="report"></div>
      <div class="graph" id="graph"></div>
      <div class="trace" id="trace"></div>
    </section>
  </main>

  <script>(function(){var t=document.getElementById('theme-toggle');if(t)t.addEventListener('click',function(){var d=document.documentElement,n=d.dataset.theme==='light'?'dark':'light';d.dataset.theme=n;try{localStorage.setItem('feelc.theme',n);}catch(e){}});})();</script>
  <script src="../static/wasm_exec.js"></script>
  <script src="shared.js"></script>
  <script src="playground.js"></script>
</body>
</html>
