<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>feelc — playground</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <nav class="nav">
    <div class="brand"><a href="../" style="color:inherit">feelc</a><span> · playground</span></div>
    <div class="links">
      <span class="wasm-status" id="wasm-status">loading engine…</span>
      <a href="../docs/">Docs</a>
      <a href="https://github.com/maxgfr/feelc" target="_blank" rel="noopener">GitHub</a>
    </div>
  </nav>

  <main class="pg">
    <!-- Left: editor + examples + simulator -->
    <section class="col left">
      <div class="bar">
        <h2>.rules</h2>
        <select id="example" title="Load an example"><option value="">— examples —</option></select>
      </div>
      <textarea id="source" spellcheck="false" placeholder="Write or paste a .rules model — it is verified and run live, in your browser."></textarea>

      <div class="run">
        <h3>Simulator</h3>
        <div class="run-row">
          <input id="decision" placeholder="decision (auto-detected)" />
          <button id="form-btn">Build form</button>
          <button id="run-btn" class="primary">Run</button>
        </div>
        <div id="sim-form" class="sim-form"></div>
        <textarea id="input" rows="2" spellcheck="false" placeholder='{"cart_total": 120, "is_member": true}'></textarea>
        <div class="output" id="output"></div>
      </div>
    </section>

    <!-- Right: verification, graph, traceability -->
    <section class="col right scroll">
      <div class="bar">
        <h2>analysis</h2>
        <div class="actions">
          <button id="verify-btn">Verify</button>
          <button id="graph-btn">Graph</button>
          <button id="trace-btn" title="Which @source citation each decision carries">Traceability</button>
        </div>
      </div>
      <div class="report" id="report"></div>
      <div class="graph" id="graph"></div>
      <div class="trace" id="trace"></div>
    </section>
  </main>

  <script src="../static/wasm_exec.js"></script>
  <script src="playground.js"></script>
</body>
</html>
